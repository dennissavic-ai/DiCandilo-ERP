name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'           # trigger on version tags like v1.0.0
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build macOS DMG
        env:
          ERP_URL: ${{ secrets.ERP_PRODUCTION_URL }}
          # Code signing (optional — remove if not signing yet)
          # CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run build:mac
        working-directory: apps/desktop

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiCandilo-ERP-mac
          path: apps/desktop/dist-electron/*.dmg

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build Windows installer
        env:
          ERP_URL: ${{ secrets.ERP_PRODUCTION_URL }}
          # Code signing (optional — remove if not signing yet)
          # WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: npm run build:win
        working-directory: apps/desktop

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiCandilo-ERP-windows
          path: apps/desktop/dist-electron/*.exe

  release:
    name: Attach to GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/**/*.dmg
            installers/**/*.exe
          generate_release_notes: true
